services:
  astarte-housekeeping:
    build:
      target: builder
    command: >
      set -e
      mix run -e Elixir.Astarte.Housekeeping.ReleaseTasks.init_database
      mix run -e Elixir.Astarte.Housekeeping.ReleaseTasks.migrate
      mix run --no-halt
    develop:
      watch:
        - path: apps/astarte_housekeeping/lib
          action: rebuild
  astarte-housekeeping-api:
    build:
      target: builder
    command: >
      mix phx.server
    develop:
      watch:
        - path: apps/astarte_housekeeping_api/lib
          action: sync
          target: /src/lib
  astarte-realm-management:
    build:
